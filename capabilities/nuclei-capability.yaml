naftiko: 1.0.0-alpha2
info:
  label: PDCP API
  description: For more details, checkout https://docs.projectdiscovery.io/api-reference/editor/scan
  tags:
  - Nuclei
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: nuclei
    baseUri: https://api.projectdiscovery.io
    description: PDCP API HTTP API.
    authentication:
      type: apikey
      in: header
      name: X-API-Key
      value: '{{NUCLEI_TOKEN}}'
    resources:
    - name: v2-template-search
      path: /v2/template/search
      operations:
      - name: get-v2-template-search
        method: GET
        description: Search Templates
        inputParameters:
        - name: scope
          in: query
          type: string
          description: Scope of templates to search (public or private)
        - name: limit
          in: query
          type: integer
          description: Maximum number of results to return
        - name: offset
          in: query
          type: integer
          description: Number of results to skip for pagination
        - name: fields
          in: query
          type: string
          description: Specific fields to return in the response
        - name: sort_asc
          in: query
          type: string
          description: Field to sort results in ascending order
        - name: sort_desc
          in: query
          type: string
          description: Field to sort results in descending order
        - name: q
          in: query
          type: string
          description: Search query string
        - name: highlight
          in: query
          type: boolean
          description: Whether to highlight search matches in results
        - name: facet_size
          in: query
          type: integer
          description: Number of facets to return in the response
        - name: X-Team-Id
          in: header
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-template-user-upload
      path: /v2/template/user/upload
      operations:
      - name: post-v2-template-user-upload
        method: POST
        description: Upload Templates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: patch-v2-template-user-upload
        method: PATCH
        description: Bulk Update User Template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-scans
      path: /v1/scans
      operations:
      - name: get-v1-scans
        method: GET
        description: Get Scan List
        inputParameters:
        - name: offset
          in: query
          type: integer
          description: number of scan-status results to skip
        - name: limit
          in: query
          type: integer
          description: number of scan-status results to fetch
        - name: search
          in: query
          type: string
          description: search term for running scans
        - name: status
          in: query
          type: string
          description: filter by status (failed, finished, queued, running, starting, uploaded, scheduled)
        - name: sort_asc
          in: query
          type: string
          description: comma separated ascending sorting e.g sort_asc=created_at,severity
        - name: sort_desc
          in: query
          type: string
          description: comma separated descending sorting e.g sort_desc=created_at,severity
        - name: is_internal
          in: query
          type: boolean
          description: filter by internal scans
        - name: X-Team-Id
          in: header
          type: string
          description: 'Retrieve the Team ID from: https://cloud.projectdiscovery.io/settings/team'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: post-v1-scans
        method: POST
        description: Create Scan
        inputParameters:
        - name: X-Team-Id
          in: header
          type: string
          description: 'Retrieve the Team ID from: https://cloud.projectdiscovery.io/settings/team'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-v1-scans
        method: DELETE
        description: Delete Scan in bulk
        inputParameters:
        - name: X-Team-Id
          in: header
          type: string
          description: 'Retrieve the Team ID from: https://cloud.projectdiscovery.io/settings/team'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-scans-scan-id
      path: /v1/scans/{scan_id}
      operations:
      - name: get-v1-scans-scan-id
        method: GET
        description: Get Scan
        inputParameters:
        - name: X-Team-Id
          in: header
          type: string
          description: 'Retrieve the Team ID from: https://cloud.projectdiscovery.io/settings/team'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-v1-scans-scan-id
        method: DELETE
        description: Delete Scan
        inputParameters:
        - name: X-Team-Id
          in: header
          type: string
          description: 'Retrieve the Team ID from: https://cloud.projectdiscovery.io/settings/team'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: patch-v1-scans-scan-id
        method: PATCH
        description: Update Scan
        inputParameters:
        - name: X-Team-Id
          in: header
          type: string
          description: 'Retrieve the Team ID from: https://cloud.projectdiscovery.io/settings/team'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-scans-import
      path: /v1/scans/import
      operations:
      - name: post-v1-scans-import
        method: POST
        description: Import OSS Scan
        inputParameters:
        - name: name
          in: query
          type: string
        - name: X-Team-Id
          in: header
          type: string
          description: 'Retrieve the Team ID from: https://cloud.projectdiscovery.io/settings/team'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-admin-user-search
      path: /v1/admin/user/search
      operations:
      - name: get-v1-admin-user-search
        method: GET
        description: Search user by name or email
        inputParameters:
        - name: q
          in: query
          type: string
          description: name or email filter
        - name: plan
          in: query
          type: string
          description: plan filter
        - name: offset
          in: query
          type: integer
          description: offset for pagination
        - name: limit
          in: query
          type: integer
          description: limit for pagination
        - name: X-Team-Id
          in: header
          type: string
          description: 'Retrieve the Team ID from: https://cloud.projectdiscovery.io/settings/team'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-admin-user-billing-assets
      path: /v1/admin/user/billing_assets
