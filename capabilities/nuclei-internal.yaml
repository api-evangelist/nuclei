        - name: offset
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
        - name: user_id
          in: query
          type: integer
        - name: event
          in: query
          type: string
          required: true
        - name: enumeration_id
          in: query
          type: string
      - name: deletev1adminautomations
        method: DELETE
        description: Delete User Automation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: event
          in: query
          type: string
          description: event string
          required: true
        - name: user_id
          in: query
          type: integer
          required: true
        - name: enumeration_id
          in: query
          type: string
          description: enumeration-id for event
      - name: updatev1adminautomations
        method: PATCH
        description: Update Automation (Admin)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: user_id
          in: query
          type: integer
          required: true
        - name: event
          in: query
          type: string
          required: true
        - name: body
