naftiko: 1.0.0-alpha2
info:
  label: PDCP API — export
  description: 'PDCP API — export. 4 operations. Lead operation: Get export list for user. Self-contained Naftiko capability
    covering one Nuclei business surface.'
  tags:
  - Nuclei
  - export
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NUCLEI_API_KEY: NUCLEI_API_KEY
capability:
  consumes:
  - type: http
    namespace: nuclei-export
    baseUri: https://api.projectdiscovery.io
    description: PDCP API — export business capability. Self-contained, no shared references.
    resources:
    - name: v1-export-list
      path: /v1/export/list
      operations:
      - name: getv1exportlist
        method: GET
        description: Get export list for user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: offset
          in: query
          type: integer
          description: The number of items to skip before starting to collect the result set
        - name: limit
          in: query
          type: integer
        - name: export_status
          in: query
          type: string
        - name: X-Team-Id
          in: header
          type: string
          description: 'Retrieve the Team ID from: https://cloud.projectdiscovery.io/settings/team'
    - name: v1-leaks-export
      path: /v1/leaks/export
      operations:
      - name: postv1leaksexport
        method: POST
        description: Export leaked credentials
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: format
          in: query
          type: string
          description: Export format (json or csv)
        - name: X-Team-Id
          in: header
          type: string
          description: 'Retrieve the Team ID from: https://cloud.projectdiscovery.io/settings/team'
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-report-export
      path: /v1/report/export
      operations:
      - name: postv1reportexport
        method: POST
        description: Export report
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: report_type
          in: query
          type: string
        - name: time
          in: query
          type: string
        - name: start_date
          in: query
          type: string
        - name: end_date
          in: query
          type: string
        - name: X-Team-Id
          in: header
          type: string
    - name: v1-scans-results-export
      path: /v1/scans/results/export
      operations:
      - name: postv1scansresultsexport
        method: POST
        description: Export filtered Scan results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: type
          in: query
          type: string
          description: json, csv, pdf (default json)
        - name: X-Team-Id
          in: header
          type: string
          description: 'Retrieve the Team ID from: https://cloud.projectdiscovery.io/settings/team'
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.NUCLEI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: nuclei-export-rest
    port: 8080
    description: REST adapter for PDCP API — export. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/v1/export/list
      name: v1-export-list
      description: REST surface for v1-export-list.
      operations:
      - method: GET
        name: getv1exportlist
        description: Get export list for user
        call: nuclei-export.getv1exportlist
        with:
          offset: rest.offset
          limit: rest.limit
          export_status: rest.export_status
          X-Team-Id: rest.X-Team-Id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/leaks/export
      name: v1-leaks-export
      description: REST surface for v1-leaks-export.
      operations:
      - method: POST
        name: postv1leaksexport
        description: Export leaked credentials
        call: nuclei-export.postv1leaksexport
        with:
          format: rest.format
          X-Team-Id: rest.X-Team-Id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/report/export
      name: v1-report-export
      description: REST surface for v1-report-export.
      operations:
      - method: POST
        name: postv1reportexport
        description: Export report
        call: nuclei-export.postv1reportexport
        with:
          report_type: rest.report_type
          time: rest.time
          start_date: rest.start_date
          end_date: rest.end_date
          X-Team-Id: rest.X-Team-Id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/scans/results/export
      name: v1-scans-results-export
      description: REST surface for v1-scans-results-export.
      operations:
      - method: POST
        name: postv1scansresultsexport
        description: Export filtered Scan results
        call: nuclei-export.postv1scansresultsexport
        with:
          type: rest.type
          X-Team-Id: rest.X-Team-Id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: nuclei-export-mcp
    port: 9090
    transport: http
    description: MCP adapter for PDCP API — export. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-export-list-user
      description: Get export list for user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nuclei-export.getv1exportlist
      with:
        offset: tools.offset
        limit: tools.limit
        export_status: tools.export_status
        X-Team-Id: tools.X-Team-Id
      outputParameters:
      - type: object
        mapping: $.
    - name: export-leaked-credentials
      description: Export leaked credentials
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: nuclei-export.postv1leaksexport
      with:
        format: tools.format
        X-Team-Id: tools.X-Team-Id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: export-report
      description: Export report
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: nuclei-export.postv1reportexport
      with:
        report_type: tools.report_type
        time: tools.time
        start_date: tools.start_date
        end_date: tools.end_date
        X-Team-Id: tools.X-Team-Id
      outputParameters:
      - type: object
        mapping: $.
    - name: export-filtered-scan-results
      description: Export filtered Scan results
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: nuclei-export.postv1scansresultsexport
      with:
        type: tools.type
        X-Team-Id: tools.X-Team-Id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
