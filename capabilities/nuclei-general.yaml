      - name: getv1assetpolicypolicyid
        method: GET
        description: Get asset policy
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: patchv1assetpolicypolicyid
        method: PATCH
        description: Update asset policy
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: update_type
          in: query
          type: string
