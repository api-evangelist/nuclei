          in: query
          type: string
          description: Optional enumeration ID to scope suggestions
        - name: limit
          in: query
          type: integer
          description: Maximum suggestions per category
        - name: threshold
          in: query
          type: number
          description: Minimum percentage threshold for anomaly detection
    - name: v1-asset-policy-policy_id
