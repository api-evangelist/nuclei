naftiko: 1.0.0-alpha2
info:
  label: PDCP API — retests
  description: 'PDCP API — retests. 3 operations. Lead operation: Get All Retest. Self-contained Naftiko capability covering
    one Nuclei business surface.'
  tags:
  - Nuclei
  - retests
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NUCLEI_API_KEY: NUCLEI_API_KEY
capability:
  consumes:
  - type: http
    namespace: nuclei-retests
    baseUri: https://api.projectdiscovery.io
    description: PDCP API — retests business capability. Self-contained, no shared references.
    resources:
    - name: v1-retest
      path: /v1/retest
      operations:
      - name: getv1retest
        method: GET
        description: Get All Retest
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: offset
          in: query
          type: integer
          description: number of results to skip
          required: true
        - name: limit
          in: query
          type: integer
          description: number of results
          required: true
        - name: X-Team-Id
          in: header
          type: string
          description: 'Retrieve the Team ID from: https://cloud.projectdiscovery.io/settings/team'
      - name: postv1retest
        method: POST
        description: Create Retest
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Team-Id
          in: header
          type: string
          description: 'Retrieve the Team ID from: https://cloud.projectdiscovery.io/settings/team'
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-retest-vuln_id
      path: /v1/retest/{vuln_id}
      operations:
      - name: getv1retestvulnid
        method: GET
        description: Get Retest Vulnerability
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Team-Id
          in: header
          type: string
          description: 'Retrieve the Team ID from: https://cloud.projectdiscovery.io/settings/team'
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.NUCLEI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: nuclei-retests-rest
    port: 8080
    description: REST adapter for PDCP API — retests. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/v1/retest
      name: v1-retest
      description: REST surface for v1-retest.
      operations:
      - method: GET
        name: getv1retest
        description: Get All Retest
        call: nuclei-retests.getv1retest
        with:
          offset: rest.offset
          limit: rest.limit
          X-Team-Id: rest.X-Team-Id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postv1retest
        description: Create Retest
        call: nuclei-retests.postv1retest
        with:
          X-Team-Id: rest.X-Team-Id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/retest/{vuln-id}
      name: v1-retest-vuln-id
      description: REST surface for v1-retest-vuln_id.
      operations:
      - method: GET
        name: getv1retestvulnid
        description: Get Retest Vulnerability
        call: nuclei-retests.getv1retestvulnid
        with:
          X-Team-Id: rest.X-Team-Id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: nuclei-retests-mcp
    port: 9090
    transport: http
    description: MCP adapter for PDCP API — retests. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-all-retest
      description: Get All Retest
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nuclei-retests.getv1retest
      with:
        offset: tools.offset
        limit: tools.limit
        X-Team-Id: tools.X-Team-Id
      outputParameters:
      - type: object
        mapping: $.
    - name: create-retest
      description: Create Retest
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: nuclei-retests.postv1retest
      with:
        X-Team-Id: tools.X-Team-Id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-retest-vulnerability
      description: Get Retest Vulnerability
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nuclei-retests.getv1retestvulnid
      with:
        X-Team-Id: tools.X-Team-Id
      outputParameters:
      - type: object
        mapping: $.
