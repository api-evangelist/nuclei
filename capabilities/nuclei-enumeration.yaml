naftiko: 1.0.0-alpha2
info:
  label: PDCP API — enumeration
  description: 'PDCP API — enumeration. 2 operations. Lead operation: Get categories for all enumerations. Self-contained
    Naftiko capability covering one Nuclei business surface.'
  tags:
  - Nuclei
  - enumeration
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NUCLEI_API_KEY: NUCLEI_API_KEY
capability:
  consumes:
  - type: http
    namespace: nuclei-enumeration
    baseUri: https://api.projectdiscovery.io
    description: PDCP API — enumeration business capability. Self-contained, no shared references.
    resources:
    - name: v1-asset-enumerate-categories
      path: /v1/asset/enumerate/categories
      operations:
      - name: getv1assetenumeratecategories
        method: GET
        description: Get categories for all enumerations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-asset-enumerate-enumerate_id-categories
      path: /v1/asset/enumerate/{enumerate_id}/categories
      operations:
      - name: getv1assetenumerateenumerateidcategories
        method: GET
        description: Get categories for specific enumeration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.NUCLEI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: nuclei-enumeration-rest
    port: 8080
    description: REST adapter for PDCP API — enumeration. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/asset/enumerate/categories
      name: v1-asset-enumerate-categories
      description: REST surface for v1-asset-enumerate-categories.
      operations:
      - method: GET
        name: getv1assetenumeratecategories
        description: Get categories for all enumerations
        call: nuclei-enumeration.getv1assetenumeratecategories
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/asset/enumerate/{enumerate-id}/categories
      name: v1-asset-enumerate-enumerate-id-categories
      description: REST surface for v1-asset-enumerate-enumerate_id-categories.
      operations:
      - method: GET
        name: getv1assetenumerateenumerateidcategories
        description: Get categories for specific enumeration
        call: nuclei-enumeration.getv1assetenumerateenumerateidcategories
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: nuclei-enumeration-mcp
    port: 9090
    transport: http
    description: MCP adapter for PDCP API — enumeration. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-categories-all-enumerations
      description: Get categories for all enumerations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nuclei-enumeration.getv1assetenumeratecategories
      outputParameters:
      - type: object
        mapping: $.
    - name: get-categories-specific-enumeration
      description: Get categories for specific enumeration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nuclei-enumeration.getv1assetenumerateenumerateidcategories
      outputParameters:
      - type: object
        mapping: $.
