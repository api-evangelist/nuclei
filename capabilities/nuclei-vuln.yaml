naftiko: 1.0.0-alpha2
info:
  label: PDCP API — vuln
  description: 'PDCP API — vuln. 1 operations. Lead operation: Get scan log stats of given scan id. Self-contained Naftiko
    capability covering one Nuclei business surface.'
  tags:
  - Nuclei
  - vuln
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NUCLEI_API_KEY: NUCLEI_API_KEY
capability:
  consumes:
  - type: http
    namespace: nuclei-vuln
    baseUri: https://api.projectdiscovery.io
    description: PDCP API — vuln business capability. Self-contained, no shared references.
    resources:
    - name: v1-scans-vulns-history
      path: /v1/scans/vulns/history
      operations:
      - name: getvulnshistory
        method: GET
        description: Get scan log stats of given scan id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: vuln_hash
          in: query
          type: array
        - name: history_limit
          in: query
          type: integer
          description: Specifies the maximum number of revisions to be returned.
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.NUCLEI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: nuclei-vuln-rest
    port: 8080
    description: REST adapter for PDCP API — vuln. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v1/scans/vulns/history
      name: v1-scans-vulns-history
      description: REST surface for v1-scans-vulns-history.
      operations:
      - method: GET
        name: getvulnshistory
        description: Get scan log stats of given scan id
        call: nuclei-vuln.getvulnshistory
        with:
          vuln_hash: rest.vuln_hash
          history_limit: rest.history_limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: nuclei-vuln-mcp
    port: 9090
    transport: http
    description: MCP adapter for PDCP API — vuln. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-scan-log-stats-given
      description: Get scan log stats of given scan id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nuclei-vuln.getvulnshistory
      with:
        vuln_hash: tools.vuln_hash
        history_limit: tools.history_limit
      outputParameters:
      - type: object
        mapping: $.
