        - name: X-Team-Id
          in: header
          type: string
          description: 'Retrieve the Team ID from: https://cloud.projectdiscovery.io/settings/team'
      - name: deletev1scansscanid
        method: DELETE
        description: Delete Scan
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Team-Id
          in: header
          type: string
          description: 'Retrieve the Team ID from: https://cloud.projectdiscovery.io/settings/team'
      - name: patchv1scansscanid
        method: PATCH
        description: Update Scan
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Team-Id
          in: header
          type: string
          description: 'Retrieve the Team ID from: https://cloud.projectdiscovery.io/settings/team'
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-scans-scan_id-asset
      path: /v1/scans/{scan_id}/asset
      operations:
      - name: getv1scansscanidassets
        method: GET
        description: Get list of unique assets for a scan.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
