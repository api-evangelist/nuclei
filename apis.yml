aid: nuclei
name: Nuclei
description: Nuclei is an open source vulnerability scanner from ProjectDiscovery that uses YAML-based templates to find security
  issues in APIs, web apps, and infrastructure. It supports multiple protocols (HTTP, DNS, TCP, file), parallel scanning,
  CI/CD integration, and ships with thousands of community-contributed templates. The ProjectDiscovery Cloud Platform exposes
  a REST API for managing templates, scans, vulnerabilities, leaks, asset discovery, exports, and more.
type: Index
